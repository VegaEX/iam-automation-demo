name: Terraform Plan

on:
  pull_request:
    branches:
      - main

defaults:
  run:
    working-directory: terraform

permissions:
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: "true"

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        env:
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
          PLAN_STDERR: ${{ steps.plan.outputs.stderr }}
        with:
          script: |
            const output = `#### Terraform Format \`${process.env.FMT_OUTCOME}\`
            #### Terraform Validate \`${process.env.VALIDATE_OUTCOME}\`
            #### Terraform Plan \`${process.env.PLAN_OUTCOME}\`

            <details><summary>Show Plan</summary>

            \`\`\`
            ${process.env.PLAN_STDOUT || process.env.PLAN_STDERR}
            \`\`\`

            </details>

            *Working directory: \`terraform/\` | Triggered by: @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if format check failed
        if: steps.fmt.outcome == 'failure'
        run: exit 1

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
