name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: terraform

permissions:
  contents: read
  issues: write

env:
  TF_IN_AUTOMATION: "true"

jobs:
  drift:
    name: Detect Drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -detailed-exitcode
        continue-on-error: true

      - name: Open drift issue
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const body = [
              "## What happened",
              "",
              "The Okta configuration has drifted from what Terraform expects. One or " +
                "more resources in the live Okta org no longer match what is declared in " +
                "the terraform/ config. This was detected by the scheduled daily drift check.",
              "",
              "## What needs to happen",
              "",
              "1. Review the plan output below to see exactly what changed.",
              "2. If the change was intentional, update the Terraform config to match and apply it.",
              "3. If the change was not intentional, run terraform apply to revert Okta back to the declared state.",
              "4. Close this issue with a note explaining what happened and how it was resolved.",
              "",
              "## Technical details",
              "",
              "<details><summary>Show Plan</summary>",
              "",
              process.env.PLAN_STDOUT,
              "",
              "</details>",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Drift detected in Okta infrastructure",
              body,
            });

      - name: Fail job if plan errored
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1
