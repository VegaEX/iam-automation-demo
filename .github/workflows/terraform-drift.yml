name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: terraform

permissions:
  contents: read
  issues: write

env:
  TF_IN_AUTOMATION: "true"

jobs:
  drift:
    name: Detect Drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -detailed-exitcode
        continue-on-error: true

      - name: Open drift issue
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const body = [
              "Terraform Cloud workspace `jangus-iam-demo` detected configuration drift " +
                "during the scheduled 08:00 UTC drift check.",
              "",
              "This means the real state of the Okta org no longer matches what's declared " +
                "in the `terraform/` configuration. See `docs/drift-detection.md` for how to " +
                "resolve it - either import the drifted resource into state or let Terraform " +
                "recreate/reconcile it on the next apply.",
              "",
              "<details><summary>Full plan output</summary>",
              "",
              "```",
              process.env.PLAN_STDOUT,
              "```",
              "</details>",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Drift detected in Okta infrastructure",
              body,
            });

      - name: Fail job if plan errored
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1
